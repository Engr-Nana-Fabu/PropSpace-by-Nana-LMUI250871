<div class="container mt-4">
  <h2 class="mb-4">My Profile</h2>
  <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
  <div *ngIf="loading" class="alert alert-info">Loading profile...</div>
  <div *ngIf="!loading" class="row">
    <div class="col-md-8">
      <div class="card">
        <div class="card-header">
          <ul class="nav nav-tabs card-header-tabs">
            <li class="nav-item">
              <a class="nav-link" [class.active]="activeTab === 'profile'" (click)="activeTab = 'profile'" href="#">Profile</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" [class.active]="activeTab === 'password'" (click)="activeTab = 'password'" href="#">Change Password</a>
            </li>
          </ul>
        </div>
        <div class="card-body">
          <form [formGroup]="profileForm" (ngSubmit)="updateProfile()" *ngIf="activeTab === 'profile'">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" class="form-control" formControlName="username">
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" [value]="user?.email" disabled>
            </div>
            <div class="mb-3">
              <label class="form-label">Phone</label>
              <input type="tel" class="form-control" formControlName="phone">
            </div>
            <div class="mb-3">
              <label class="form-label">Avatar URL</label>
              <input type="url" class="form-control" formControlName="avatar">
            </div>
            <button type="submit" class="btn btn-primary" [disabled]="updateLoading">
              {{ updateLoading ? 'Updating...' : 'Update Profile' }}
            </button>
          </form>
          <form [formGroup]="passwordForm" (ngSubmit)="changePassword()" *ngIf="activeTab === 'password'">
            <div class="mb-3">
              <label class="form-label">Current Password</label>
              <input type="password" class="form-control" formControlName="oldPassword">
            </div>
            <div class="mb-3">
              <label class="form-label">New Password</label>
              <input type="password" class="form-control" formControlName="newPassword">
            </div>
            <button type="submit" class="btn btn-primary" [disabled]="passwordLoading">
              {{ passwordLoading ? 'Changing...' : 'Change Password' }}
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
